<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dord Roller - OBS Display</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cinzel:wght@400;700&family=Oswald:wght@400;600&family=Press+Start+2P&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Roll Overlay (existing) -->
  <div id="roll-overlay">
    <div id="roll-display" class="hidden">
      <div class="roll-container">
        <div class="roll-label"></div>
        <div id="large-result"></div>
        <div id="roll-details"></div>
      </div>
    </div>
  </div>

  <!-- Health Bar Overlay -->
  <div id="health-bar-overlay">
    <div class="health-group" id="party-group">
      <div class="group-label">PARTY</div>
      <div class="group-bars"></div>
    </div>
    <div class="health-group" id="enemy-group">
      <div class="group-label">ENEMIES</div>
      <div class="group-bars"></div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
